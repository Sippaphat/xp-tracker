<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7F77DD" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#3C3489" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="XP Tracker">
  <title>Extraordinary expenses</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #ffffff;
      --bg2:    #F5F3FF;
      --bg3:    #EDE9FF;
      --bgd:    #FFF2F2;
      --text:   #18181B;
      --text2:  #71717A;
      --text3:  #A1A1AA;
      --textd:  #B91C1C;
      --bdr:    rgba(100,80,220,0.10);
      --bdr2:   rgba(100,80,220,0.18);
      --accent: #7F77DD;
      --acctd:  #6B5FCC;
      --rmd:    10px;
      --rlg:    16px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:    #1E1B2E;
        --bg2:   #252238;
        --bg3:   #18162A;
        --bgd:   rgba(185,28,28,0.18);
        --text:  #F0EDF8;
        --text2: #8B87A0;
        --text3: #5C5875;
        --textd: #F87171;
        --bdr:   rgba(160,140,255,0.12);
        --bdr2:  rgba(160,140,255,0.22);
      }
    }

    html { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 16px;
      color: var(--text);
      background: var(--bg3);
      min-height: 100%;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 28px);
    }

    .app-bar {
      background: linear-gradient(150deg, #9B91E8 0%, #7F77DD 40%, #534AB7 100%);
      color: #fff;
      padding: calc(env(safe-area-inset-top, 0px) + 20px) 20px 22px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .app-bar-inner { display: flex; align-items: center; gap: 14px; }
    .app-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .app-icon i { font-size: 22px; color: #fff; }
    .app-bar h1 { font-size: 19px; font-weight: 600; letter-spacing: -0.3px; }
    .app-bar p  { font-size: 12px; opacity: 0.72; margin-top: 3px; }

    .main { padding: 14px; max-width: 720px; margin: 0 auto; }

    .card {
      background: var(--bg);
      border-radius: var(--rlg);
      padding: 1rem 1.125rem;
      margin-bottom: 14px;
      box-shadow: 0 2px 14px rgba(90,70,200,0.08), 0 0 0 0.5px rgba(90,70,200,0.05);
    }
    @media (prefers-color-scheme: dark) {
      .card { box-shadow: none; border: 0.5px solid var(--bdr); }
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    /* Personality banner */
    .persona {
      border-radius: var(--rlg);
      padding: 14px 16px;
      margin-bottom: 14px;
      display: none;
    }
    .persona-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .persona-sub   { font-size: 13px; opacity: 0.78; }

    /* Metrics */
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .metric {
      background: var(--bg);
      border-radius: var(--rlg);
      padding: 14px;
      box-shadow: 0 2px 14px rgba(90,70,200,0.08), 0 0 0 0.5px rgba(90,70,200,0.05);
    }
    @media (prefers-color-scheme: dark) {
      .metric { box-shadow: none; border: 0.5px solid var(--bdr); }
    }
    .metric-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .metric-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
    .metric-icon  { font-size: 17px; color: var(--accent); opacity: 0.55; }
    .metric-value { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
    .metric-value.sm { font-size: 15px; font-weight: 600; letter-spacing: 0; line-height: 1.4; }

    /* Form */
    .fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .fgrid .span2 { grid-column: 1 / -1; }
    @media (max-width: 400px) {
      .fgrid { grid-template-columns: 1fr; }
      .fgrid .span2 { grid-column: 1; }
    }
    label.fl { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
    label.fl.hidden { visibility: hidden; }

    input, select {
      width: 100%;
      height: 44px;
      border: 1px solid var(--bdr2);
      border-radius: var(--rmd);
      background: var(--bg2);
      color: var(--text);
      font: inherit;
      font-size: 16px;
      padding: 0 12px;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input::placeholder { color: var(--text3); }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(127,119,221,0.22);
    }
    .sel-wrap { position: relative; }
    .sel-wrap::after {
      content: '';
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      width: 0; height: 0;
      border: 5px solid transparent;
      border-top-color: var(--text2);
      pointer-events: none;
    }
    #catdot {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      width: 10px; height: 10px;
      border-radius: 50%;
      pointer-events: none;
      transition: background 0.2s;
    }
    #ec { padding-left: 30px; padding-right: 30px; }

    button {
      height: 44px;
      border: 1px solid var(--bdr2);
      border-radius: var(--rmd);
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 15px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 16px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s, transform 0.1s;
      width: 100%;
    }
    button:hover  { background: var(--bg2); }
    button:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
      border-radius: 999px;
      letter-spacing: 0.01em;
    }
    .btn-primary:hover { background: var(--acctd); border-color: var(--acctd); }

    .err { font-size: 13px; color: var(--textd); margin-top: 8px; display: none; }

    /* Category pills */
    .cat-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 999px;
      font-weight: 700;
      flex-shrink: 0;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    /* Expense rows */
    .erow {
      display: flex;
      align-items: stretch;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 0.5px solid var(--bdr);
    }
    .erow:last-child { border-bottom: none; }
    .erow-bar { width: 3px; border-radius: 3px; flex-shrink: 0; }
    .erow-body { flex: 1; min-width: 0; }
    .erow-top  {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .erow-bottom { display: flex; align-items: center; justify-content: space-between; }
    .erow-amount { font-size: 15px; font-weight: 700; flex-shrink: 0; letter-spacing: -0.3px; }
    .erow-name   { font-size: 14px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; padding-right: 8px; }
    .erow-date   { font-size: 12px; color: var(--text3); flex-shrink: 0; }

    .delbtn {
      background: none !important;
      border: none !important;
      box-shadow: none !important;
      width: auto !important;
      height: auto !important;
      cursor: pointer;
      color: var(--text3);
      padding: 5px;
      border-radius: var(--rmd);
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .delbtn:hover, .delbtn:active { color: var(--textd) !important; background: var(--bgd) !important; }

    /* Bottom layout */
    .bottom-grid { display: flex; gap: 14px; flex-wrap: wrap; }
    .chart-panel { flex: 1; min-width: 200px; }
    .list-panel  { flex: 2; min-width: 260px; }
    @media (max-width: 540px) {
      .chart-panel, .list-panel { flex: 1 1 100%; }
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .new-row { animation: slide-in 0.22s cubic-bezier(0.16, 1, 0.3, 1); }
  </style>
</head>
<body>

<div class="app-bar" role="banner">
  <div class="app-bar-inner">
    <div class="app-icon"><i class="ti ti-star" aria-hidden="true"></i></div>
    <div>
      <h1>Extraordinary</h1>
      <p>Track the spending that makes life interesting</p>
    </div>
  </div>
</div>

<main class="main">

  <div class="persona" id="persona" role="status" aria-live="polite">
    <p class="persona-title" id="persona-title"></p>
    <p class="persona-sub"   id="persona-sub"></p>
  </div>

  <div class="card">
    <p class="card-title">New expense</p>
    <div class="fgrid">
      <div class="span2">
        <label class="fl" for="en">What was it?</label>
        <input type="text" id="en" placeholder="e.g. Hot air balloon ride" autocomplete="off" autocorrect="off">
      </div>
      <div>
        <label class="fl" for="ea">Amount (฿)</label>
        <input type="number" id="ea" placeholder="0" min="0" step="1" inputmode="numeric">
      </div>
      <div>
        <label class="fl" for="ed">Date</label>
        <input type="date" id="ed">
      </div>
      <div>
        <label class="fl" for="ec">Category</label>
        <div class="sel-wrap">
          <span id="catdot" style="background:#1D9E75"></span>
          <select id="ec" onchange="updateCatDot()">
            <option value="adventure">Adventure</option>
            <option value="impulse">Impulse buy</option>
            <option value="experience">Experience</option>
            <option value="splurge">Splurge</option>
            <option value="tech">Tech &amp; gadgets</option>
            <option value="selfcare">Self-care</option>
          </select>
        </div>
      </div>
      <div>
        <label class="fl hidden" aria-hidden="true">Add</label>
        <button class="btn-primary" onclick="addExp()">
          <i class="ti ti-plus" aria-hidden="true"></i> Add expense
        </button>
      </div>
    </div>
    <p class="err" id="err" role="alert">Fill in all fields with a valid amount.</p>
  </div>

  <div class="metrics" role="region" aria-label="Summary">
    <div class="metric">
      <div class="metric-top"><p class="metric-label">Total spent</p><i class="ti ti-cash metric-icon" aria-hidden="true"></i></div>
      <p class="metric-value" id="m-total">฿0</p>
    </div>
    <div class="metric">
      <div class="metric-top"><p class="metric-label">Logged</p><i class="ti ti-list-check metric-icon" aria-hidden="true"></i></div>
      <p class="metric-value" id="m-count">0</p>
    </div>
    <div class="metric">
      <div class="metric-top"><p class="metric-label">Biggest splurge</p><i class="ti ti-trophy metric-icon" aria-hidden="true"></i></div>
      <p class="metric-value" id="m-big">฿0</p>
    </div>
    <div class="metric">
      <div class="metric-top"><p class="metric-label">Top category</p><i class="ti ti-crown metric-icon" aria-hidden="true"></i></div>
      <p class="metric-value sm" id="m-top">—</p>
    </div>
  </div>

  <div class="bottom-grid">
    <div class="chart-panel card">
      <p class="card-title">By category</p>
      <div id="leg" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px"></div>
      <div style="position:relative;height:200px">
        <canvas id="cc" role="img" aria-label="Doughnut chart showing expense breakdown by category">No data yet.</canvas>
      </div>
      <p id="ce" style="text-align:center;font-size:13px;color:var(--text2);padding:2rem 0">Add expenses to see the breakdown</p>
    </div>
    <div class="list-panel card">
      <p class="card-title">All expenses</p>
      <div id="list" role="list"></div>
    </div>
  </div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CAT = {
  adventure:  { l:'Adventure',      bg:'#E1F5EE', tx:'#085041', hx:'#1D9E75', i:'ti-mountain'      },
  impulse:    { l:'Impulse buy',    bg:'#FAECE7', tx:'#712B13', hx:'#D85A30', i:'ti-shopping-cart' },
  experience: { l:'Experience',     bg:'#EEEDFE', tx:'#3C3489', hx:'#7F77DD', i:'ti-ticket'        },
  splurge:    { l:'Splurge',        bg:'#FBEAF0', tx:'#72243E', hx:'#D4537E', i:'ti-star'          },
  tech:       { l:'Tech & gadgets', bg:'#E6F1FB', tx:'#0C447C', hx:'#378ADD', i:'ti-device-laptop' },
  selfcare:   { l:'Self-care',      bg:'#FAEEDA', tx:'#633806', hx:'#BA7517', i:'ti-heart'         },
};

const PERSONA = {
  adventure:  { title:'Life is your playground',          sub:'Most of your spending goes toward adventures'        },
  impulse:    { title:'You live in the moment',            sub:'Bold, spontaneous, and unforgettable'               },
  experience: { title:'You collect memories',              sub:'Experiences over things, always'                    },
  splurge:    { title:'You know how to treat yourself',    sub:'A true connoisseur of the finer things in life'     },
  tech:       { title:'The early adopter',                 sub:'Always first in line for the next big thing'        },
  selfcare:   { title:'You know how to recharge',          sub:'Balance and wellbeing always come first'            },
};

let db = JSON.parse(localStorage.getItem('xpe3') || '[]');
let chart = null;
let centerTotal = '';

const centerPlugin = {
  id: 'center',
  afterDraw(ch) {
    if (!centerTotal) return;
    const { ctx, chartArea: { top, bottom, left, right } } = ch;
    const cx = (left + right) / 2;
    const cy = (top + bottom) / 2;
    const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = isDark ? '#F0EDF8' : '#18181B';
    ctx.font = '700 15px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.fillText(centerTotal, cx, cy - 9);
    ctx.font = '400 11px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.fillStyle = isDark ? '#8B87A0' : '#71717A';
    ctx.fillText('total', cx, cy + 9);
    ctx.restore();
  }
};

function save() { localStorage.setItem('xpe3', JSON.stringify(db)); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n) { return '฿' + Math.round(n).toLocaleString('en'); }

function updateCatDot() {
  const c = document.getElementById('ec').value;
  document.getElementById('catdot').style.background = CAT[c].hx;
}

function addExp() {
  const n = document.getElementById('en').value.trim();
  const a = parseFloat(document.getElementById('ea').value);
  const c = document.getElementById('ec').value;
  const d = document.getElementById('ed').value;
  const err = document.getElementById('err');
  if (!n || isNaN(a) || a <= 0 || !d) { err.style.display = 'block'; return; }
  err.style.display = 'none';
  db.unshift({ id: Date.now(), n, a, c, d });
  save();
  render(true);
  document.getElementById('en').value = '';
  document.getElementById('ea').value = '';
}

function delExp(id) { db = db.filter(e => e.id !== id); save(); render(false); }

function render(animateFirst) {
  const total = db.reduce((s, e) => s + e.a, 0);
  const big   = db.reduce((m, e) => Math.max(m, e.a), 0);
  const cats  = {};
  for (const e of db) cats[e.c] = (cats[e.c] || 0) + e.a;
  const top = Object.entries(cats).sort((a, b) => b[1] - a[1])[0];

  document.getElementById('m-total').textContent = fmt(total);
  document.getElementById('m-count').textContent = db.length;
  document.getElementById('m-big').textContent   = big > 0 ? fmt(big) : '฿0';
  document.getElementById('m-top').textContent   = top ? CAT[top[0]].l : '—';

  const persona = document.getElementById('persona');
  if (top && db.length >= 3) {
    const p = PERSONA[top[0]];
    const c = CAT[top[0]];
    document.getElementById('persona-title').textContent = p.title;
    document.getElementById('persona-sub').textContent   = p.sub;
    persona.style.display    = 'block';
    persona.style.background = c.bg;
    persona.style.color      = c.tx;
  } else {
    persona.style.display = 'none';
  }

  const list = document.getElementById('list');
  if (db.length === 0) {
    list.innerHTML = '<p style="text-align:center;font-size:13px;color:var(--text2);padding:2rem 0;line-height:2"><i class="ti ti-star" style="font-size:26px;display:block;margin:0 auto 6px;opacity:0.3" aria-hidden="true"></i>No extraordinary expenses yet.<br>Add your first one above.</p>';
  } else {
    list.innerHTML = db.map((e, idx) => {
      const cat = CAT[e.c];
      const dt  = new Date(e.d + 'T00:00:00');
      const ds  = dt.toLocaleDateString('en', { month: 'short', day: 'numeric' });
      const cls = (idx === 0 && animateFirst) ? ' new-row' : '';
      return `<div class="erow${cls}" role="listitem">
        <div class="erow-bar" style="background:${cat.hx}"></div>
        <div class="erow-body">
          <div class="erow-top">
            <span class="cat-tag" style="background:${cat.bg};color:${cat.tx}">
              <i class="ti ${cat.i}" aria-hidden="true"></i>${cat.l}
            </span>
            <span style="flex:1"></span>
            <span class="erow-amount" style="color:${cat.hx}">${fmt(e.a)}</span>
            <button class="delbtn" onclick="delExp(${e.id})" aria-label="Delete ${esc(e.n)}">
              <i class="ti ti-trash" style="font-size:15px" aria-hidden="true"></i>
            </button>
          </div>
          <div class="erow-bottom">
            <span class="erow-name">${esc(e.n)}</span>
            <span class="erow-date">${ds}</span>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  updateChart(cats, total);
}

function updateChart(cats, total) {
  const ce     = document.getElementById('ce');
  const canvas = document.getElementById('cc');
  const leg    = document.getElementById('leg');
  const keys   = Object.keys(cats);

  if (keys.length === 0) {
    ce.style.display = 'block'; canvas.style.display = 'none'; leg.innerHTML = '';
    centerTotal = '';
    if (chart) { chart.destroy(); chart = null; }
    return;
  }

  ce.style.display = 'none'; canvas.style.display = 'block';
  centerTotal = fmt(total);

  const labels = keys.map(k => CAT[k].l);
  const vals   = keys.map(k => Math.round(cats[k]));
  const colors = keys.map(k => CAT[k].hx);
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const border = isDark ? '#1E1B2E' : '#ffffff';

  leg.innerHTML = keys.map(k =>
    `<span style="display:inline-flex;align-items:center;gap:5px;font-size:12px">
      <span style="width:8px;height:8px;border-radius:50%;background:${CAT[k].hx};display:inline-block;flex-shrink:0"></span>
      <span style="color:var(--text2)">${CAT[k].l}</span>
      <span style="color:var(--text3)">${Math.round(cats[k] / total * 100)}%</span>
    </span>`
  ).join('');

  if (chart) {
    chart.data.labels = labels;
    chart.data.datasets[0].data = vals;
    chart.data.datasets[0].backgroundColor = colors;
    chart.data.datasets[0].borderColor = border;
    chart.update();
  } else {
    chart = new Chart(canvas, {
      type: 'doughnut',
      data: { labels, datasets: [{ data: vals, backgroundColor: colors, borderWidth: 3, borderColor: border }] },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '65%',
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ' ' + fmt(ctx.raw) } }
        }
      },
      plugins: [centerPlugin]
    });
  }
}

document.getElementById('ed').value = new Date().toISOString().split('T')[0];
render(false);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}
</script>
</body>
</html>
